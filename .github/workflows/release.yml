name: Release

on:
  push:
    paths:
      - 'version.txt'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave empty to use version.txt)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    outputs:
      tag: ${{ steps.check_tag.outputs.tag }}
      changelog: ${{ steps.generate_changelog.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version from version.txt
        id: read_version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(cat version.txt | head -1)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="${{ steps.read_version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist"
          fi

      - name: Read changelog from version.txt
        id: generate_changelog
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          # Read changelog from version.txt (all lines after the first line)
          CHANGELOG=$(tail -n +2 version.txt)

          if [ -z "$CHANGELOG" ]; then
            echo "No changelog found in version.txt"
            CHANGELOG="Release ${{ steps.read_version.outputs.version }}"
          fi

          echo "Changelog from version.txt:"
          echo "$CHANGELOG"

          # Write to output
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create and push tag
        id: create_tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="${{ steps.read_version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"

  goreleaser:
    runs-on: ubuntu-latest
    needs: [auto-tag]
    if: |
      always() &&
      needs.auto-tag.outputs.tag != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Install dependencies for CLI build
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Prepare release notes
        id: release_notes
        run: |
          # Use changelog from version.txt (passed from auto-tag job)
          CHANGELOG="${{ needs.auto-tag.outputs.changelog }}"

          if [ -n "$CHANGELOG" ]; then
            echo "Using changelog from version.txt"
            echo "$CHANGELOG" > /tmp/release_notes.md
            echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT
          else
            echo "No changelog available, using GoReleaser automatic changelog"
            echo "notes_file=" >> $GITHUB_OUTPUT
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean ${{ steps.release_notes.outputs.notes_file && format('--release-notes={0}', steps.release_notes.outputs.notes_file) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
