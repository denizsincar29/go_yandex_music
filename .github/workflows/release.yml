name: Release

on:
  push:
    paths:
      - 'version.txt'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave empty to use version.txt)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    outputs:
      tag: ${{ steps.create_tag.outputs.tag }}
      changelog: ${{ steps.generate_changelog.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Read version from version.txt
        id: read_version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(cat version.txt | head -1)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.read_version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.read_version.outputs.tag }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.read_version.outputs.tag }} does not exist"
          fi
      
      - name: Get latest tag
        id: get_latest_tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous tags found"
            echo "latest_tag=" >> $GITHUB_OUTPUT
          else
            echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "Latest tag: $LATEST_TAG"
          fi
      
      - name: Generate changelog with Copilot
        id: generate_changelog
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const version = '${{ steps.read_version.outputs.version }}';
            const latestTag = '${{ steps.get_latest_tag.outputs.latest_tag }}';
            
            // Get commits since last tag
            let commits = [];
            try {
              const compareResult = latestTag 
                ? await github.rest.repos.compareCommits({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    base: latestTag,
                    head: context.sha
                  })
                : { data: { commits: [] } };
              
              commits = compareResult.data.commits || [];
            } catch (error) {
              console.log('Error getting commits:', error.message);
              // Get recent commits if compare fails
              const commitsResult = await github.rest.repos.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 20
              });
              commits = commitsResult.data;
            }
            
            // Format commits for changelog
            let changelogLines = [];
            commits.forEach(commit => {
              const message = commit.commit.message.split('\n')[0];
              if (!message.match(/^(merge|Merge)/i)) {
                changelogLines.push(`- ${message} (${commit.sha.substring(0, 7)})`);
              }
            });
            
            // Read changelog from version.txt if it exists
            let versionFileContent = fs.readFileSync('version.txt', 'utf8').trim();
            let lines = versionFileContent.split('\n');
            let changelogFromFile = '';
            if (lines.length > 1) {
              // Changelog is on lines after the version
              changelogFromFile = lines.slice(1).join('\n').trim();
            }
            
            // Generate changelog
            let changelog = `## What's Changed\n\n`;
            
            if (changelogFromFile) {
              changelog += changelogFromFile + '\n\n';
            }
            
            if (changelogLines.length > 0) {
              changelog += '### Commits\n\n' + changelogLines.join('\n');
            } else {
              changelog += 'No significant changes in this release.';
            }
            
            console.log('Generated changelog:\n', changelog);
            
            // Write to output
            const changelogEncoded = Buffer.from(changelog).toString('base64');
            fs.writeFileSync(process.env.GITHUB_OUTPUT, `changelog<<EOF\n${changelog}\nEOF\n`, { flag: 'a' });
            
            return changelog;
      
      - name: Create and push tag
        id: create_tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="${{ steps.read_version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Created and pushed tag: $TAG"
  
  goreleaser:
    runs-on: ubuntu-latest
    needs: [auto-tag]
    if: |
      always() && 
      needs.auto-tag.outputs.tag != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Fetch tags
        run: git fetch --tags --force
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'
      
      - name: Prepare release notes
        id: release_notes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Use generated changelog from auto-tag job
            echo "Using generated changelog"
            CHANGELOG="${{ needs.auto-tag.outputs.changelog }}"
          else
            # Use GoReleaser's automatic changelog
            echo "Using GoReleaser automatic changelog"
            CHANGELOG=""
          fi
          
          # Save to file for GoReleaser
          if [ -n "$CHANGELOG" ]; then
            echo "$CHANGELOG" > /tmp/release_notes.md
            echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT
          else
            echo "notes_file=" >> $GITHUB_OUTPUT
          fi
      
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v8
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean ${{ steps.release_notes.outputs.notes_file && format('--release-notes={0}', steps.release_notes.outputs.notes_file) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}